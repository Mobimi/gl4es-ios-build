name: Build GL4ES 1.1.6 for iOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build libgl4es_114.dylib (v1.1.6)
    runs-on: macos-latest

    steps:
      - name: Install dependencies
        run: brew install cmake ldid wget

      - name: Clone GL4ES master (v1.1.6)
        run: |
          git clone --depth 1 https://github.com/ptitSeb/gl4es gl4es
          cd gl4es
          wget https://github.com/leetal/ios-cmake/raw/master/ios.toolchain.cmake

      - name: Patch Darwin incompatibilities
        run: |
          cd gl4es

          # Fix AliasDecl - not supported on Darwin
          sed -i '' 's/__attribute__((alias(_STM(OLD,DEF))))//g' src/gl/attributes.h

          # Fix glEnableClientStatei and glDisableClientStatei missing symbols
          cat >> src/gl/directstate.c << 'EOF'
          void APIENTRY_GL4ES gl4es_glEnableClientStatei(GLenum array, GLuint index) { gl4es_glEnableClientStateIndexed(array, index); }
          void APIENTRY_GL4ES gl4es_glDisableClientStatei(GLenum array, GLuint index) { gl4es_glDisableClientStateIndexed(array, index); }
          EOF

          # Fix missing glGetFloatv, glStencilFunc, glStencilOp
          # Thêm alias wrapper vào ios_compat.c thay vì rename trong source gốc
          cat > src/gl/ios_compat.c << 'EOF'
          #include "gl_includes.h"
          #include "loader.h"

          // iOS does not have system libGL, so we provide these aliases
          // pointing to gl4es internal implementations
          void glGetFloatv(GLenum pname, GLfloat *params);
          void glGetFloatv(GLenum pname, GLfloat *params) {
              gl4es_glGetFloatv(pname, params);
          }

          void glStencilFunc(GLenum func, GLint ref, GLuint mask);
          void glStencilFunc(GLenum func, GLint ref, GLuint mask) {
              gl4es_glStencilFunc(func, ref, mask);
          }

          void glStencilOp(GLenum fail, GLenum zfail, GLenum zpass);
          void glStencilOp(GLenum fail, GLenum zfail, GLenum zpass) {
              gl4es_glStencilOp(fail, zfail, zpass);
          }
          EOF

          # Thêm ios_compat.c vào CMakeLists
          sed -i '' 's|src/gl/logs.c|src/gl/logs.c\n    src/gl/ios_compat.c|g' src/CMakeLists.txt

      - name: Build GL4ES for iOS arm64
        run: |
          cd gl4es
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
            -DPLATFORM=OS64 \
            -DDEFAULT_ES=2 \
            -DNOX11=ON \
            -DNOEGL=OFF \
            -DSTATICLIB=OFF \
            -DCMAKE_C_FLAGS="-Wno-error=implicit-function-declaration -Wno-error=unused-function -DNOGLX"
          cmake --build build --config RelWithDebInfo --target GL
          cp lib/libGL.dylib ../libgl4es_114.dylib
          ldid -S ../libgl4es_114.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: libgl4es_114-v1.1.6
          path: libgl4es_114.dylib

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gl4es-1.1.6-ios
          name: GL4ES 1.1.6 for iOS
          files: libgl4es_114.dylib
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
